<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>گوی جادویی نئون</title>
    <link href="https://cdn.jsdelivr.net/dfp/1.0.1/font-iranian-sans.css" rel="stylesheet" type="text/css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #0a0a16 0%, #030307 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Iranian Sans', Tahoma, sans-serif;
            overflow: hidden;
            color: #fff;
            user-select: none;
            -webkit-user-select: none;
        }

        #instruction {
            font-size: 20px;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 0 0 10px #00f5d4;
            color: #00f5d4;
            transition: opacity 0.5s ease;
        }

        /* گوی نئونی جادویی */
        .orb-container {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .orb {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #00bfff 0%, #7b2cbf 70%, #000 100%);
            box-shadow: 0 0 30px #00bfff, inset 0 0 20px rgba(255,255,255,0.6), 0 0 60px #7b2cbf;
            cursor: pointer;
            transition: transform 0.2s ease;
            animation: float 4s ease-in-out infinite alternate;
        }

        @keyframes float {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* حالت لرزش شدید هنگام لمس */
        .orb.charging {
            animation: shake 0.1s infinite alternate !important;
            box-shadow: 0 0 50px #00f5d4, inset 0 0 30px #fff, 0 0 80px #00bfff;
            background: radial-gradient(circle at 30% 30%, #00f5d4 0%, #00bfff 70%, #000 100%);
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        /* بخش نمایش پیام جادویی */
        #message-box {
            margin-top: 50px;
            font-size: 24px;
            font-weight: bold;
            min-height: 40px;
            max-width: 85vw;
            text-align: center;
            line-height: 1.6;
            color: #fff;
            text-shadow: 0 0 15px #00bfff, 0 0 25px #00bfff;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #message-box.reveal {
            opacity: 1;
            transform: scale(1);
        }
    </style>
</head>
<body>

    <div id="instruction">انگشتت رو روی گوی جادویی نگه دار و نیت کن...</div>
    
    <div class="orb-container">
        <div class="orb" id="magicOrb"></div>
    </div>

    <div id="message-box"></div>

    <script>
        const orb = document.getElementById('magicOrb');
        const instruction = document.getElementById('instruction');
        const messageBox = document.getElementById('message-box');

        // جملات جادویی و رمانتیک (میتونی هرچقدر میخوای اضافه یا عوض کنی)
        const loveQuotes = [
            "« تو قشنگ‌ترین فرکانس مدار زندگی منی ✨ »",
            "« گوی جادویی میگه: امروز بیشتر از دیروز دوستت داره ❤️ »",
            "« تو همان اتفاقی هستی که کل جهانم رو زیباتر کردی 🌌 »",
            "« در طالع تو یک نفر هست که جونش به خنده‌هات بسته‌ست 😉 »",
            "« ستاره‌ها تایید کردن؛ تو خوش‌قلب‌ترین دختر روی زمینی 💫 »",
            "« فال تو سرشار از آرامش و عشق در کنار اونیه که برات ساخته... »"
        ];

        let chargeTimer;

        function startCharging() {
            orb.classList.add('charging');
            messageBox.classList.remove('reveal');
            instruction.style.opacity = '0.5';
            instruction.innerText = "در حال خواندن نیت شما...";

            // بعد از ۳ ثانیه نگه داشتن، پیام فاش میشه
            chargeTimer = setTimeout(() => {
                stopCharging();
                revealMagic();
            }, 2500);
        }

        function stopCharging() {
            orb.classList.remove('charging');
            if (chargeTimer) clearTimeout(chargeTimer);
        }

        function revealMagic() {
            instruction.style.opacity = '1';
            instruction.innerText = "گوی جادویی پاسخ داد! 👇";
            
            // انتخاب رندوم جمله
            const randomQuote = loveQuotes[Math.floor(Math.random() * loveQuotes.length)];
            messageBox.innerText = randomQuote;
            messageBox.classList.add('reveal');

            // ایجاد یک ویبره کوچک در گوشی (در صورت پشتیبانی مرورگر)
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
        }

        // رویدادهای لمس و موس برای نگه داشتن دکمه
        orb.addEventListener('touchstart', (e) => { e.preventDefault(); startCharging(); });
        orb.addEventListener('touchend', stopCharging);
        orb.addEventListener('mousedown', startCharging);
        orb.addEventListener('mouseup', stopCharging);
        orb.addEventListener('mouseleave', stopCharging);
    </script>
</body>
</html>
